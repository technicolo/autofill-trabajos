<!doctype html><meta charset="utf-8">
<form style="max-width:420px;margin:24px auto;display:grid;gap:8px">
  <label>Full name <input name="fullName" placeholder="Nombre y apellido"></label>
  <label>Email <input name="email" placeholder="Email"></label>
  <label>Teléfono <input name="phone" placeholder="Teléfono"></label>
  <label>Ciudad <input name="city" placeholder="Ciudad"></label>
  <label>Provincia <input name="province" placeholder="Provincia"></label>
  <label>País <input name="country" placeholder="País"></label>
  <label>LinkedIn <input name="linkedin" placeholder="LinkedIn"></label>
  <label>GitHub <input name="github" placeholder="GitHub"></label>
  <label>Portfolio <input name="portfolio" placeholder="Website"></label>
  <label>Sobre mí <textarea name="resume" placeholder="Sobre mí"></textarea></label>
  <button type="submit">Enviar</button>
</form>
